name: Deploy to Cloudflare Pages
on: [push]
jobs:
  build:
    runs-on: ubuntu-slim
    name: Deploy to Cloudflare Pages
    permissions:
      contents: read
      deployments: write
    env:
      PUBLIC_SOCIAL_GITHUB: ${{ secrets.PUBLIC_SOCIAL_GITHUB }}
      PUBLIC_SOCIAL_X: ${{ secrets.PUBLIC_SOCIAL_X }}
      PUBLIC_SOCIAL_LINKEDIN: ${{ secrets.PUBLIC_SOCIAL_LINKEDIN }}
      PUBLIC_SOCIAL_EMAIL: ${{ secrets.PUBLIC_SOCIAL_EMAIL }}
      PUBLIC_GOOGLE_SITE_VERIFICATION: ${{ secrets.PUBLIC_GOOGLE_SITE_VERIFICATION }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest
      - run: bun install
      - run: bun run build
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=astroblog
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
